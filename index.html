<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pokémon Champions 対面チェッカー Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#e3350d;--red-dark:#b02a09;--blue:#1a73e8;--green:#0f9960;--yellow:#f5c518;--bg:#0d0f14;--surface:#161922;--surface2:#1e2230;--border:rgba(255,255,255,0.08);--text:#f0f2f8;--muted:#8890a8}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 60px}
.header{padding:20px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.header-title{font-family:'Rajdhani',sans-serif;font-weight:900;font-size:20px;letter-spacing:1px;color:var(--red)}
.btn-save-group{display:flex;gap:8px}
button.action-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer}
button.action-btn:active{background:var(--border)}

.container{padding:16px;max-width:800px;margin:0 auto}
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:600px){.team-grid{grid-template-columns:1fr}}

.team-card{background:var(--surface);border-radius:12px;padding:16px;border:1px solid var(--border)}
.team-label{font-weight:700;font-size:14px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.team-label.me{color:var(--blue)}.team-label.opp{color:var(--red)}

.poke-inputs{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.input-group{position:relative}
input.poke-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px;color:#fff;font-size:14px}
.suggest-list{position:absolute;width:100%;background:var(--surface2);border:1px solid var(--border);z-index:10;max-height:150px;overflow-y:auto;border-radius:0 0 6px 6px;display:none}
.suggest-item{padding:8px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border)}
.suggest-item:hover{background:rgba(255,255,255,0.05)}

.analyze-btn{width:100%;padding:16px;background:var(--red);color:#fff;border:none;border-radius:12px;font-weight:900;font-size:18px;margin-bottom:20px;box-shadow:0 4px 15px rgba(227,53,13,0.3)}

.result-area{display:none}
.matrix-card{background:var(--surface);border-radius:12px;padding:16px;overflow-x:auto;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:8px;text-align:center;border:1px solid var(--border)}
.eff-2{background:rgba(227,53,13,0.2);color:#ff4d4d;font-weight:bold}
.eff-05{background:rgba(26,115,232,0.2);color:#4dadff}
.eff-0{background:#333;color:#888}

.advice-card{background:var(--surface2);border-radius:12px;padding:16px;border-left:4px solid var(--yellow)}
.advice-item{margin-bottom:8px;font-size:13px;line-height:1.5}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">POKÉMON CHAMPIONS CHECKER</div>
</div>

<div class="container">
  <div class="team-grid">
    <div class="team-card">
      <div class="team-label me">
        自分のチーム
        <button class="action-btn" onclick="saveTeam('my')">保存</button>
        <button class="action-btn" onclick="loadTeam('my')">読込</button>
      </div>
      <div class="poke-inputs" id="my-inputs"></div>
    </div>
    
    <div class="team-card">
      <div class="team-label opp">
        相手のチーム
        <button class="action-btn" onclick="saveTeam('opp')">保存</button>
        <button class="action-btn" onclick="loadTeam('opp')">読込</button>
      </div>
      <div class="poke-inputs" id="opp-inputs"></div>
    </div>
  </div>

  <button class="analyze-btn" onclick="analyze()">分析開始</button>

  <div id="result-area" class="result-area">
    <div class="matrix-card" id="matrix-container"></div>
    <div class="advice-card" id="advice-card"></div>
  </div>
</div>

<script>
let DB = {};
const TYPES = ["ノーマル","ほのお","みず","くさ","でんき","こおり","かくとう","どく","じめん","ひこう","エスパー","むし","いわ","ゴースト","ドラゴン","あく","はがね","フェアリー"];
const CHART = {
  "ノーマル": { "いわ": 0.5, "ゴースト": 0, "はがね": 0.5 },
  "ほのお": { "みず": 0.5, "くさ": 2, "こおり": 2, "むし": 2, "いわ": 0.5, "ドラゴン": 0.5, "はがね": 2 },
  "みず": { "ほのお": 2, "くさ": 0.5, "じめん": 2, "いわ": 2, "ドラゴン": 0.5 },
  "くさ": { "ほのお": 0.5, "みず": 2, "どく": 0.5, "じめん": 2, "ひこう": 0.5, "むし": 0.5, "いわ": 2, "ドラゴン": 0.5, "はがね": 0.5 },
  "でんき": { "みず": 2, "くさ": 0.5, "でんき": 0.5, "じめん": 0, "ひこう": 2, "ドラゴン": 0.5 },
  "こおり": { "ほのお": 0.5, "みず": 0.5, "くさ": 2, "こおり": 0.5, "じめん": 2, "ひこう": 2, "ドラゴン": 2, "はがね": 0.5 },
  "かくとう": { "ノーマル": 2, "こおり": 2, "どく": 0.5, "ひこう": 0.5, "エスパー": 0.5, "むし": 0.5, "いわ": 2, "あく": 2, "はがね": 2, "フェアリー": 0.5, "ゴースト": 0 },
  "どく": { "くさ": 2, "どく": 0.5, "じめん": 0.5, "いわ": 0.5, "ゴースト": 0.5, "はがね": 0, "フェアリー": 2 },
  "じめん": { "ほのお": 2, "くさ": 0.5, "でんき": 2, "どく": 2, "ひこう": 0, "むし": 0.5, "いわ": 2, "はがね": 2 },
  "ひこう": { "くさ": 2, "でんき": 0.5, "かくとう": 2, "むし": 2, "いわ": 0.5, "はがね": 0.5 },
  "エスパー": { "かくとう": 2, "どく": 2, "エスパー": 0.5, "あく": 0, "はがね": 0.5 },
  "むし": { "ほのお": 0.5, "くさ": 2, "かくとう": 0.5, "どく": 0.5, "ひこう": 0.5, "エスパー": 2, "ゴースト": 0.5, "あく": 2, "はがね": 0.5, "フェアリー": 0.5 },
  "いわ": { "ほのお": 2, "こおり": 2, "かくとう": 0.5, "じめん": 0.5, "ひこう": 2, "むし": 2, "はがね": 0.5 },
  "ゴースト": { "ノーマル": 0, "エスパー": 2, "ゴースト": 2, "あく": 0.5 },
  "ドラゴン": { "ドラゴン": 2, "はがね": 0.5, "フェアリー": 0 },
  "あく": { "かくとう": 0.5, "エスパー": 2, "ゴースト": 2, "あく": 0.5, "フェアリー": 0.5 },
  "はがね": { "ほのお": 0.5, "みず": 0.5, "でんき": 0.5, "こおり": 2, "いわ": 2, "はがね": 0.5, "フェアリー": 2 },
  "フェアリー": { "ほのお": 0.5, "かくとう": 2, "どく": 0.5, "ドラゴン": 2, "あく": 2, "はがね": 0.5 }
};

// 入力枠生成
function initInputs() {
  ['my', 'opp'].forEach(side => {
    const container = document.getElementById(`${side}-inputs`);
    for(let i=1; i<=6; i++) {
      const div = document.createElement('div');
      div.className = 'input-group';
      div.innerHTML = `
        <input type="text" id="${side}${i}" class="poke-input" placeholder="${i}体目" autocomplete="off" oninput="suggest('${side}${i}')">
        <div id="sug_${side}${i}" class="suggest-list"></div>
      `;
      container.appendChild(div);
    }
  });
}

// サジェスト機能
function suggest(id) {
  const val = document.getElementById(id).value;
  const list = document.getElementById('sug_'+id);
  list.innerHTML = '';
  if(!val) { list.style.display = 'none'; return; }
  
  const matches = Object.keys(DB).filter(name => name.includes(val)).slice(0, 5);
  if(matches.length > 0) {
    list.style.display = 'block';
    matches.forEach(m => {
      const item = document.createElement('div');
      item.className = 'suggest-item';
      item.textContent = m;
      item.onclick = () => { document.getElementById(id).value = m; list.style.display = 'none'; };
      list.appendChild(item);
    });
  } else {
    list.style.display = 'none';
  }
}

// 保存・読込 (localStorage)
function saveTeam(side) {
  const team = [];
  for(let i=1; i<=6; i++) team.push(document.getElementById(side+i).value);
  localStorage.setItem('pk_team_'+side, JSON.stringify(team));
  alert('ブラウザに保存しました');
}

function loadTeam(side) {
  const saved = localStorage.getItem('pk_team_'+side);
  if(saved) {
    const team = JSON.parse(saved);
    team.forEach((v, i) => document.getElementById(side+(i+1)).value = v);
  }
}

function getEff(atkType, defTypes) {
  let res = 1;
  defTypes.forEach(t => { if(CHART[atkType] && CHART[atkType][t] !== undefined) res *= CHART[atkType][t]; });
  return res;
}

function analyze() {
  const myTeam = [], oppTeam = [];
  for(let i=1; i<=6; i++) {
    const n1 = document.getElementById('my'+i).value;
    if(DB[n1]) myTeam.push({name:n1, data:DB[n1]});
    const n2 = document.getElementById('opp'+i).value;
    if(DB[n2]) oppTeam.push({name:n2, data:DB[n2]});
  }

  if(myTeam.length === 0 || oppTeam.length === 0) return alert('ポケモンを入力してください');
  document.getElementById('result-area').style.display = 'block';

  // マトリクス作成
  let html = '<table><tr><th>自分＼相手</th>' + oppTeam.map(p => `<th>${p.name}</th>`).join('') + '</tr>';
  myTeam.forEach(my => {
    html += `<tr><td><strong>${my.name}</strong></td>`;
    oppTeam.forEach(opp => {
      let maxEff = 0;
      my.data.types.forEach(at => {
        const e = getEff(at, opp.data.types);
        if(e > maxEff) maxEff = e;
      });
      const cls = maxEff >= 2 ? 'eff-2' : (maxEff <= 0.5 ? 'eff-05' : '');
      html += `<td class="${cls}">${maxEff}x</td>`;
    });
    html += '</tr>';
  });
  html += '</table>';
  document.getElementById('matrix-container').innerHTML = html;

  // アドバイス
  const all = [...myTeam, ...oppTeam].sort((a,b) => (b.data.stats.spe) - (a.data.stats.spe));
  document.getElementById('advice-card').innerHTML = `
    <div class="advice-item"><strong>素早さ順:</strong> ${all.map(p => `${p.name}(${p.data.stats.spe})`).join(' > ')}</div>
    <div class="advice-item">※表の数値は、自分のタイプ一致技が相手に与える最大倍率です。</div>
  `;
}

// 起動時にDB読み込み
fetch('pokemon-db.json').then(r => r.json()).then(data => {
  DB = data;
  initInputs();
});
</script>
</body>
</html>
