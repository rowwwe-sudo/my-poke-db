<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pokémon Champions Checker Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#e3350d;--red-dark:#b02a09;--blue:#1a73e8;--green:#0f9960;--yellow:#f5c518;--bg:#0d0f14;--surface:#161922;--surface2:#1e2230;--border:rgba(255,255,255,0.08);--text:#f0f2f8;--muted:#8890a8}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 60px}
.container{padding:16px;max-width:800px;margin:0 auto}
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.team-card{background:var(--surface);border-radius:12px;padding:16px;border:1px solid var(--border)}
.poke-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px;color:#fff}
select{width:100%;margin-top:4px;background:var(--surface2);color:#fff;border-radius:6px;padding:6px}
.move{width:48%;margin:2px 1%}
.analyze-btn{width:100%;padding:12px;background:var(--red);color:#fff;border:none;border-radius:12px}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid var(--border);padding:6px;text-align:center}
.eff2{background:#ff4d4d}
.eff05{background:#4da6ff}
</style>
</head>
<body>
<div class="container">
<div class="team-grid">
<div class="team-card"><h3>自分</h3><div id="my-inputs"></div></div>
<div class="team-card"><h3>相手</h3><div id="opp-inputs"></div></div>
</div>
<button class="analyze-btn" onclick="analyze()">分析開始</button>
<div id="result"></div>
</div>

<script>
let DB={};

const CHART={"ほのお":{"くさ":2,"みず":0.5},"みず":{"ほのお":2},"くさ":{"みず":2}};

const NATURES={neutral:{},atk_up:{up:'atk',down:'spA'},spe_up:{up:'spe',down:'spA'}};

function initInputs(){
 ['my','opp'].forEach(side=>{
  const c=document.getElementById(side+'-inputs');
  for(let i=1;i<=6;i++){
   const d=document.createElement('div');
   d.innerHTML=`
    <input id="${side}${i}" class="poke-input" placeholder="ポケモン">
    <select id="nature_${side}${i}">
      <option value="neutral">補正なし</option>
      <option value="atk_up">いじっぱり</option>
      <option value="spe_up">ようき</option>
    </select>
    <div>
      <input id="move_${side}${i}_1" class="move" placeholder="技1">
      <input id="move_${side}${i}_2" class="move" placeholder="技2">
      <input id="move_${side}${i}_3" class="move" placeholder="技3">
      <input id="move_${side}${i}_4" class="move" placeholder="技4">
    </div>
   `;
   c.appendChild(d);
  }
 });
}

function getTeam(side){
 const t=[];
 for(let i=1;i<=6;i++){
  const name=document.getElementById(side+i).value;
  if(!name) continue;
  t.push({
   name,
   nature:document.getElementById(`nature_${side}${i}`).value,
   moves:[
    document.getElementById(`move_${side}${i}_1`).value,
    document.getElementById(`move_${side}${i}_2`).value,
    document.getElementById(`move_${side}${i}_3`).value,
    document.getElementById(`move_${side}${i}_4`).value
   ]
  });
 }
 return t;
}

function getEff(){return Math.random()>0.5?2:0.5;}

function analyze(){
 const my=getTeam('my');
 const opp=getTeam('opp');
 let html='<table><tr><th></th>';
 opp.forEach(o=>html+=`<th>${o.name}</th>`);
 html+='</tr>';
 my.forEach(m=>{
  html+=`<tr><td>${m.name}</td>`;
  opp.forEach(o=>{
   const e=getEff();
   const cls=e>=2?'eff2':e<=0.5?'eff05':'';
   html+=`<td class="${cls}">${e}</td>`;
  });
  html+='</tr>';
 });
 html+='</table>';
 document.getElementById('result').innerHTML=html;
}

function save(){
 localStorage.setItem('my',JSON.stringify(getTeam('my')));
 localStorage.setItem('opp',JSON.stringify(getTeam('opp')));
}

function load(){
 const my=JSON.parse(localStorage.getItem('my')||'[]');
 my.forEach((p,i)=>{
  document.getElementById('my'+(i+1)).value=p.name;
  document.getElementById(`nature_my${i+1}`).value=p.nature;
  p.moves.forEach((m,j)=>document.getElementById(`move_my${i+1}_${j+1}`).value=m);
 });
}

initInputs();
</script>
</body>
</html>
